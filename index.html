<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy - Orange Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/awesome/6.0.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .chat-box { height: calc(100vh - 160px); }
        .mjx-container { font-size: 115% !important; overflow-x: auto; }
        .copy-btn:active { transform: scale(0.9); transition: 0.1s; }
        
        /* Màu chủ đề chính: Cam và Vàng */
        .bg-theme { background-color: #f97316; } /* Orange-600 */
        .text-theme { color: #f97316; }
        .border-theme { border-color: #f97316; }
        .bg-theme-light { background-color: #fffbeb; } /* Amber-50 */
        .bg-user-msg { background-color: #fbbf24; } /* Amber-400 */
    </style>
</head>

    <header class="bg-white p-4 shadow-sm flex justify-between items-center border-b sticky top-0 z-10 border-theme">
        <div class="flex items-center gap-2">
            <div class="bg-theme p-2 rounded-lg text-white"><i class="fas fa-graduation-cap"></i></div>
            <h1 class="text-slate-800 font-bold text-lg">AI Study Buddy</h1>
        </div>
        <span class="text-[10px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-bold uppercase tracking-wider">Online</span>
    </header>

    <main id="chat-display" class="chat-box overflow-y-auto p-4 space-y-5 max-w-3xl mx-auto w-full"></main>

        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="userInput" class="flex-1 bg-slate-100 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-orange-400 shadow-inner" placeholder="Hỏi gia sư về bài tập...">
            <button onclick="send()" class="bg-theme text-white w-14 h-14 rounded-2xl hover:bg-orange-700 shadow-lg flex items-center justify-center"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </footer>
