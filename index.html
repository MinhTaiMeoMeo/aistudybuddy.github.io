<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy - Orange Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .chat-box { height: calc(100vh - 160px); }
        .mjx-container { font-size: 110% !important; overflow-x: auto; }
        .copy-btn:active { transform: scale(0.9); transition: 0.1s; }
        /* Tùy chỉnh thanh cuộn màu cam */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body class="bg-amber-50 flex flex-col h-screen font-sans">

    <header class="bg-orange-600 p-4 shadow-lg flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2 text-white">
            <i class="fas fa-robot text-2xl"></i>
            <h1 class="font-bold text-xl tracking-tight">AI Study Buddy</h1>
        </div>
        <div class="bg-white/20 px-3 py-1 rounded-full border border-white/30">
            <span class="text-[10px] text-white font-bold uppercase tracking-widest animate-pulse">● Online</span>
        </div>
    </header>

    <main id="chat-display" class="chat-box overflow-y-auto p-4 space-y-6 max-w-3xl mx-auto w-full"></main>

    <footer class="p-4 bg-white border-t-2 border-orange-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div class="max-w-3xl mx-auto flex gap-3">
            <input type="text" id="userInput" 
                   class="flex-1 bg-amber-50 border-2 border-amber-100 rounded-2xl px-6 py-4 outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-100 transition-all" 
                   placeholder="Hỏi gia sư về Toán, Lý, Hóa...">
            <button onclick="send()" 
                    class="bg-orange-600 text-white w-14 h-14 rounded-2xl hover:bg-orange-700 shadow-lg flex items-center justify-center transition-all active:scale-90 shadow-orange-200">
                <i class="fas fa-paper-plane text-xl"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatDisplay = document.getElementById('chat-display');
        const API_URL = "https://ai-backend-logic.onrender.com/chat";

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const isAI = role === 'ai';
            div.innerHTML = `
                <div class="group relative max-w-[85%]">
                    <div class="${isAI ? 'bg-white border-2 border-orange-50 text-slate-800' : 'bg-orange-500 text-white shadow-orange-200'} p-4 rounded-3xl shadow-sm leading-relaxed">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                    ${isAI ? `
                        <button onclick="copyContent(this)" class="copy-btn absolute -right-10 top-2 p-2 rounded-lg text-slate-300 opacity-0 group-hover:opacity-100 transition-all hover:text-orange-600 bg-white border shadow-sm">
                            <i class="far fa-copy"></i>
                        </button>` : ''}
                </div>`;
            
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;

            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([div]);
            }
        }

        async function copyContent(btn) {
            const text = btn.previousElementSibling.innerText;
            await navigator.clipboard.writeText(text);
            const icon = btn.querySelector('i');
            icon.className = 'fas fa-check text-green-500';
            setTimeout(() => { icon.className = 'far fa-copy'; }, 2000);
        }

        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMsg('user', msg);
            input.value = '';

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                addMsg('ai', data.reply || "Gia sư đang bận suy nghĩ, bạn hỏi lại nhé!");
            } catch (err) {
                addMsg('ai', "❌ Lỗi kết nối! Bạn đợi 30 giây rồi thử lại nhé.");
            }
        }

        // CÂU CHÀO MỪNG TỰ ĐỘNG KHI MỞ TRANG
        window.onload = () => {
            setTimeout(() => {
                addMsg('ai', "Chào bạn! 🌟 Mình là **AI Study Buddy**. Hôm nay bạn muốn mình cùng đồng hành giải quyết thử thách kiến thức nào? Mình sẽ gợi ý từng bước để bạn tự chinh phục nhé!");
            }, 500);
        };

        document.getElementById('userInput').addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
