<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-dots span { animation: pulse 1s infinite; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fas fa-robot fa-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">AI Study Buddy</h1>
        </div>
        <div class="flex items-center gap-2 text-green-500 text-sm font-medium">
            <span class="h-2 w-2 bg-green-500 rounded-full animate-ping"></span>
            Hệ thống đang chạy
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 max-w-4xl mx-auto w-full chat-container">
        <div class="flex justify-start">
            <div class="bg-white border p-4 rounded-2xl rounded-bl-none shadow-sm max-w-[85%] text-slate-700 leading-relaxed">
                Chào bạn! Mình là trợ lý học tập chạy bằng **Gemini API**. Bạn cần mình tóm tắt bài học hay giải bài tập gì không?
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto relative flex items-center gap-2">
            <input type="text" id="userInput" 
                class="w-full border border-slate-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all" 
                placeholder="Nhập nội dung bài học hoặc câu hỏi...">
            <button onclick="handleSend()" id="sendBtn"
                class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // LINK BACKEND CỦA BẠN ĐÃ ĐƯỢC ĐIỀN Ở ĐÂY
        const API_URL = "https://ai-backend-logic.onrender.com/chat";

        function appendMessage(role, text) {
            const isUser = role === 'user';
            const msgHtml = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="${isUser ? 'bg-blue-600 text-white shadow-blue-200' : 'bg-white border text-slate-700 shadow-sm'} rounded-2xl px-5 py-3 max-w-[85%] shadow-md leading-relaxed">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                </div>`;
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;

            // Hiệu ứng loading
            const loadingId = 'loading-' + Date.now();
            chatContainer.insertAdjacentHTML('beforeend', `
                <div id="${loadingId}" class="flex justify-start loading-dots text-slate-400">
                    <div class="bg-white border px-5 py-3 rounded-2xl shadow-sm italic">
                        AI đang suy nghĩ<span>.</span><span>.</span><span>.</span>
                    </div>
                </div>`);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                appendMessage('ai', data.reply || "AI không phản hồi, hãy thử lại.");
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('ai', "❌ Lỗi: Không thể kết nối tới server. Có thể do Render đang khởi động (mất ~50s). Hãy thử lại sau 1 phút.");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Gửi bằng phím Enter
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
