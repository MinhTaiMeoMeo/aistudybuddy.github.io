<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] } };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .chat-box { height: calc(100vh - 180px); }
        .preview-img { max-height: 100px; border-radius: 10px; display: none; }
    </style>
</head>
<body class="bg-amber-50 flex flex-col h-screen font-sans">

    <header class="bg-orange-600 p-4 shadow-lg flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2 text-white">
            <i class="fas fa-camera-retro text-2xl"></i>
            <h1 class="font-bold text-xl">AI Study Buddy Pro</h1>
        </div>
    </header>

    <main id="chat-display" class="chat-box overflow-y-auto p-4 space-y-6 max-w-3xl mx-auto w-full"></main>

    <footer class="p-4 bg-white border-t-2 border-orange-100 shadow-lg">
        <div class="max-w-3xl mx-auto space-y-2">
            <img id="imgPreview" class="preview-img border-2 border-orange-400 mb-2">
            <div class="flex gap-2 items-center">
                <button onclick="document.getElementById('fileInput').click()" class="text-orange-600 p-3 hover:bg-orange-50 rounded-xl transition-all">
                    <i class="fas fa-image text-2xl"></i>
                </button>
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewFile()">
                
                <input type="text" id="userInput" class="flex-1 bg-slate-100 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-orange-500" placeholder="Hỏi hoặc gửi ảnh bài tập...">
                
                <button onclick="send()" id="sendBtn" class="bg-orange-600 text-white w-14 h-14 rounded-2xl hover:bg-orange-700 flex items-center justify-center shadow-lg transition-all active:scale-90">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chatDisplay = document.getElementById('chat-display');
        const API_URL = "https://ai-backend-logic.onrender.com/chat";
        let currentBase64 = null;

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                currentBase64 = reader.result;
                const img = document.getElementById('imgPreview');
                img.src = currentBase64;
                img.style.display = 'block';
            };
            if (file) reader.readAsDataURL(file);
        }

        function addMsg(role, text, img = null) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in`;
            
            const isAI = role === 'ai';
            div.innerHTML = `
                <div class="group relative max-w-[85%] space-y-2">
                    ${img ? `<img src="${img}" class="rounded-xl max-w-xs border-2 border-orange-200">` : ''}
                    <div class="${isAI ? 'bg-white border-2 border-orange-50' : 'bg-orange-500 text-white'} p-4 rounded-3xl shadow-sm leading-relaxed">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                </div>`;
            
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            if (window.MathJax) MathJax.typesetPromise([div]);
        }

        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg && !currentBase64) return;

            addMsg('user', msg, currentBase64);
            
            // Xóa preview ảnh sau khi gửi
            const imgBase64ToSend = currentBase64;
            currentBase64 = null;
            document.getElementById('imgPreview').style.display = 'none';
            input.value = '';

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, image: imgBase64ToSend })
                });
                const data = await res.json();
                addMsg('ai', data.reply || "Gia sư đang suy nghĩ...");
            } catch (err) {
                addMsg('ai', "❌ Lỗi: Có thể ảnh quá nặng hoặc AI hết lượt dùng.");
            }
        }
    </script>
</body>
</html>
