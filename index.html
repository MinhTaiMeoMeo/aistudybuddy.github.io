<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script style="display: none !important;" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .chat-container { height: calc(100vh - 160px); }
        /* Đảm bảo công thức toán học không bị tràn khung chat */
        .mjx-container { overflow-x: auto; overflow-y: hidden; max-width: 100%; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <header class="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800">AI Study Buddy</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-slate-500 uppercase">Online</span>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-container max-w-3xl mx-auto p-4 overflow-y-auto space-y-4"></main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="userInput" 
                   class="flex-1 bg-slate-100 border-none rounded-2xl px-5 py-3 focus:ring-2 focus:ring-blue-500 outline-none" 
                   placeholder="Hỏi gia sư về Toán, Lý, Hóa...">
            <button onclick="handleSend()" id="sendBtn" 
                    class="bg-blue-600 text-white w-12 h-12 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const API_URL = "https://ai-backend-logic.onrender.com/chat"; // Link Render của bạn

        function appendMessage(role, text, source = "") {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn`;
            
            const innerHTML = `
                <div class="max-w-[85%]">
                    <div class="${role === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-slate-800 border'} p-4 rounded-2xl shadow-sm leading-relaxed">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                    ${source ? `<div class="text-[10px] text-slate-400 mt-1 uppercase px-2 font-bold">${source}</div>` : ''}
                </div>
            `;
            
            div.innerHTML = innerHTML;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // KÍCH HOẠT MATHJAX: Vẽ lại công thức toán học ngay sau khi tin nhắn hiện ra
            if (window.MathJax) {
                MathJax.typesetPromise([div]).catch((err) => console.log('MathJax error:', err));
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';

            // Hiệu ứng đang tải
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = "text-slate-400 text-xs italic ml-2";
            loadingDiv.innerText = "Gia sư đang suy nghĩ...";
            chatBox.appendChild(loadingDiv);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.error) throw new Error(data.error);
                appendMessage('ai', data.reply, data.source || "Gia Sư");

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('ai', "❌ Lỗi: " + error.message);
            }
        }

        // Gửi bằng phím Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Tin nhắn chào mừng ban đầu
        window.onload = () => {
            appendMessage('ai', "Chào bạn! Mình là AI Study Buddy. Hôm nay bạn muốn cùng mình khám phá kiến thức nào? Mình sẽ không cho đáp án ngay đâu, nhưng mình sẽ giúp bạn tự tìm ra nó! 😊");
        };
    </script>

</body>
</html>
