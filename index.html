<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col">

    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-brain mr-2"></i>AI Learning Assistant</h1>
        <div id="status" class="text-xs text-green-500 font-medium">● Hệ thống sẵn sàng</div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-4xl mx-auto w-full">
        <div class="flex justify-start">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 max-w-[80%] shadow-sm">
                Chào bạn! Mình là trợ lý học tập. Bạn muốn mình tóm tắt bài học hay vẽ sơ đồ tư duy cho chủ đề nào hôm nay?
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-slate-200">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="userInput" 
                class="flex-1 border border-slate-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                placeholder="Nhập nội dung bài học hoặc câu hỏi...">
            <button onclick="handleSend()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl transition-all flex items-center gap-2">
                <span>Gửi</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        
        function appendMessage(role, text) {
            const isUser = role === 'user';
            const msgHtml = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200'} rounded-2xl p-4 max-w-[80%] shadow-sm">
                        ${text}
                    </div>
                </div>`;
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';

            try {
                // Thay link Render của bạn vào đây
                const response = await fetch("https://YOUR_BACKEND_URL/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                appendMessage('ai', data.reply);
            } catch (error) {
                appendMessage('ai', 'Lỗi kết nối rồi bạn ơi! Kiểm tra lại Backend nhé.');
            }
        }
    </script>
</body>
</html>
